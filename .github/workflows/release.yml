name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger only when pushing tags starting with 'v', e.g., 'v1.0.0'

jobs:
  build:
    name: Build EXEs
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build main application EXE
        run: pyinstaller claims_scanner.spec --noconfirm

      - name: Build updater EXE
        run: pyinstaller argus_updater.spec --noconfirm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: dist/*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
